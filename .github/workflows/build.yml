name: Build WelcomeToRazor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-win-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: juce-win-

      - name: Configure (Release)
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" -Directory | Select-Object -First 1
          if ($vst3) {
            Copy-Item -Recurse -Force $vst3.FullName artifacts\WelcomeToRazor.vst3
          }
          # Also grab the standalone exe if present
          $exe = Get-ChildItem -Path build -Recurse -Filter "WelcomeToRazor*.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item -Force $exe.FullName artifacts\WelcomeToRazor_Standalone.exe
          }

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: WelcomeToRazor-Windows-VST3
          path: artifacts/
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS VST3 + AU (Universal Binary)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-mac-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: juce-mac-

      - name: Install Ninja
        run: brew install ninja

      - name: Configure — arm64
        run: |
          cmake -B build_arm64 -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -G Ninja

      - name: Build — arm64
        run: cmake --build build_arm64 --config Release --parallel

      - name: Configure — x86_64
        run: |
          cmake -B build_x64 -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 \
            -G Ninja

      - name: Build — x86_64
        run: cmake --build build_x64 --config Release --parallel

      - name: Create Universal Binary (lipo)
        run: |
          mkdir -p artifacts

          # ── VST3 ──────────────────────────────────────────────────────
          ARM_VST3=$(find build_arm64 -name "*.vst3" -type d | head -1)
          X64_VST3=$(find build_x64   -name "*.vst3" -type d | head -1)

          if [ -n "$ARM_VST3" ] && [ -n "$X64_VST3" ]; then
            cp -R "$ARM_VST3" artifacts/WelcomeToRazor.vst3
            ARM_BIN=$(find "$ARM_VST3/Contents/MacOS" -type f | head -1)
            X64_BIN=$(find "$X64_VST3/Contents/MacOS" -type f | head -1)
            if [ -n "$ARM_BIN" ] && [ -n "$X64_BIN" ]; then
              DEST_BIN=$(find "artifacts/WelcomeToRazor.vst3/Contents/MacOS" -type f | head -1)
              lipo "$ARM_BIN" "$X64_BIN" -create -output "$DEST_BIN"
              echo "✅ VST3 Universal Binary created"
              lipo -archs "$DEST_BIN"
            fi
          fi

          # ── AU (Component) ─────────────────────────────────────────────
          ARM_AU=$(find build_arm64 -name "*.component" -type d | head -1)
          X64_AU=$(find build_x64   -name "*.component" -type d | head -1)

          if [ -n "$ARM_AU" ] && [ -n "$X64_AU" ]; then
            cp -R "$ARM_AU" artifacts/WelcomeToRazor.component
            ARM_BIN=$(find "$ARM_AU/Contents/MacOS"  -type f | head -1)
            X64_BIN=$(find "$X64_AU/Contents/MacOS"  -type f | head -1)
            if [ -n "$ARM_BIN" ] && [ -n "$X64_BIN" ]; then
              DEST_BIN=$(find "artifacts/WelcomeToRazor.component/Contents/MacOS" -type f | head -1)
              lipo "$ARM_BIN" "$X64_BIN" -create -output "$DEST_BIN"
              echo "✅ AU Universal Binary created"
              lipo -archs "$DEST_BIN"
            fi
          fi

          # ── Standalone ─────────────────────────────────────────────────
          ARM_APP=$(find build_arm64 -name "*.app" -type d | head -1)
          X64_APP=$(find build_x64   -name "*.app" -type d | head -1)

          if [ -n "$ARM_APP" ] && [ -n "$X64_APP" ]; then
            cp -R "$ARM_APP" artifacts/WelcomeToRazor.app
            ARM_BIN=$(find "$ARM_APP/Contents/MacOS"  -type f | head -1)
            X64_BIN=$(find "$X64_APP/Contents/MacOS"  -type f | head -1)
            if [ -n "$ARM_BIN" ] && [ -n "$X64_BIN" ]; then
              DEST_BIN=$(find "artifacts/WelcomeToRazor.app/Contents/MacOS" -type f | head -1)
              lipo "$ARM_BIN" "$X64_BIN" -create -output "$DEST_BIN"
              echo "✅ Standalone Universal Binary created"
              lipo -archs "$DEST_BIN"
            fi
          fi

          ls -la artifacts/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WelcomeToRazor-macOS-Universal
          path: artifacts/
          if-no-files-found: warn
